<!DOCTYPE html>
<html lang="kz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кіру - Физика Білім Платформасы</title>
    <link rel="icon" type="image/png" href="лого.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eaf4fc 0%, #d4e4f5 100%);
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .logo {
            height: 55px;
            width: 55px;
            object-fit: contain;
            border-radius: 50%;
            background: #1E90FF20;
            padding: 5px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E90FF, #0066cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            color: #666;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 1px solid #1E90FF20;
        }

        .login-container h2 {
            text-align: center;
            color: #1E90FF;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1E90FF;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(30,144,255,0.15);
        }

        .login-btn {
            padding: 15px;
            background: linear-gradient(135deg, #1E90FF, #0066cc);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30,144,255,0.3);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: #718096;
        }

        .register-link a {
            color: #1E90FF;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .register-link a:hover {
            color: #0066cc;
            text-decoration: underline;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .logo {
                height: 50px;
                width: 50px;
            }
            
            .header-text h1 {
                font-size: 1.3rem;
            }
            
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="лого.png" alt="Логотип" class="logo" onerror="this.src='https://via.placeholder.com/55?text=Ph'">
        <div class="header-text">
            <h1>🔬 Физика Білім Платформасы</h1>
            <p>9 сынып педагогтарына арналған көмекші құрал</p>
        </div>
    </header>

    <main class="content">
        <div class="login-container">
            <h2>🔐 Жүйеге кіру</h2>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">📧 Email:</label>
                    <input type="email" id="email" placeholder="Email енгізіңіз" required>
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 Құпия сөз:</label>
                    <input type="password" id="password" placeholder="Құпия сөзді енгізіңіз" required>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">Кіру</button>
            </form>
            
            <div class="register-link">
                Аккаунтыңыз жоқ па? <a href="register.html">📝 Тіркелу</a>
            </div>
            <div id="message"></div>
        </div>
    </main>

    <script>
        // ============ БЭКЕНД КОНФИГУРАЦИЯСЫ ============
        const API_URL = "https://site-physics.onrender.com";
        const ADMIN_EMAIL = "kuatkyzyaizada1@gmail.com";
        
        // ============ Кіру функциясы (бэкендпен жұмыс) ============
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const msgDiv = document.getElementById('message');
            
            // Валидация
            if (!email || !password) {
                msgDiv.innerHTML = '<div class="error-message">⚠️ Email және құпия сөзді толтырыңыз!</div>';
                return;
            }
            
            // Кнопканы өшіріп, жүктеу режиміне қою
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Кіру...';
            msgDiv.innerHTML = '';
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Жүйеге кірген пайдаланушыны localStorage-ге сақтау
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: data.user.id,
                        name: data.user.name,
                        email: email,
                        isAdmin: data.user.isAdmin
                    }));
                    
                    msgDiv.innerHTML = '<div class="success-message">✅ Сәтті кірдіңіз! Бағытталуда...</div>';
                    
                    setTimeout(() => {
                        if (data.user.isAdmin) {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);
                } else {
                    msgDiv.innerHTML = `<div class="error-message">❌ ${data.message || 'Email немесе құпия сөз дұрыс емес!'}</div>`;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Кіру';
                }
            } catch (error) {
                console.error('Login error:', error);
                msgDiv.innerHTML = '<div class="error-message">❌ Серверге қосылу мүмкін болмады. Бэкенд жұмыс істеп тұрғанын тексеріңіз.</div>';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Кіру';
            }
        }
        
        // ============ Бет жүктелгенде, егер пайдаланушы кіріп тұрса ============
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                try {
                    const user = JSON.parse(currentUser);
                    if (user.email === ADMIN_EMAIL) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } catch(e) {
                    console.error('Қате:', e);
                    localStorage.removeItem('currentUser');
                }
            }
        });
        
        // Форма жіберілгенде
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
