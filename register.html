<!DOCTYPE html>
<html lang="kz">
<head>
    <meta charset="UTF-8">
    <title>Тіркелу</title>
    <style>
        body { font-family: Arial; background: #eaf4fc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 95%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .link { color: #1E90FF; cursor: pointer; margin-top: 15px; display: inline-block; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📝 Тіркелу</h2>
    <input type="text" id="name" placeholder="Аты-жөні">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="register()">Тіркелу</button>
    <div class="link" onclick="location.href='login.html'">Кіру</div>
    <div id="message"></div>
</div>

<script>
function register() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const msgDiv = document.getElementById('message');
    
    if (!name || !email || !password) {
        msgDiv.innerHTML = '<span class="error">Барлық өрістерді толтырыңыз!</span>';
        return;
    }
    
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    
    if (users.find(u => u.email === email)) {
        msgDiv.innerHTML = '<span class="error">Бұл email тіркелген!</span>';
        return;
    }
    
    const newUser = {
        name: name,
        email: email,
        password: password,
        memberSince: new Date().toLocaleDateString('kk-KZ'),
        tests: []
    };
    
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('currentUser', JSON.stringify(newUser));
    
    msgDiv.innerHTML = '<span class="success">Тіркелу сәтті! Бағытталуда...</span>';
    setTimeout(() => {
        window.location.href = 'user.html';
    }, 1000);
}
</script>
</body>
</html>
